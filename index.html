<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid - Care Bears</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="sidebar-text">Only with CSS Grid</div>
    <div class="grid-container">
        
        <div class="grid-item item-title">
        <h1>Care Bears</h1>
        </div>
        <div class="grid-item item-img1">
            <img src="power-bear.png" alt="Power Bear Banner">
            <div class="grid-item item-img2">
                <img src="purple-bear.png" alt="funko purple bear sweet"></div>
        <div class="grid-item item-img3">
            <img src="green-funko-bear.png" alt="funko green bear"></div>
        
        <div class="grid-item item-main-img">
            <img src="sweet-bear.png" alt="Care Bears Central">
        </div>
        
        <div class="grid-item item-img4">
            <img src="yellow-funko-bear.png" alt="funko yellow bear sweet"></div>

        <div class="grid-item item-img5">
            <img src="rainbown-bear.png" alt="rainbown happy bear"></div>
        <div class="grid-item item-img6">
            <img src="blue-funko-bear.png" alt="funko blue bear happy"></div>

        <div class="grid-item item-img7">
            <img src="dream-bear.png" alt="dream bear sweet"></div>
        <div class="grid-item item-img8">
            <img src="pink-bear.png" alt="funko pink bear"></div>
        <div class="grid-item item-img9">
            <img src="love-all-bear.png" alt="Love All Banner"></div>

    </div>
        </div>    
</body>
</html>
